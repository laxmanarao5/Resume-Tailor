<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --text-color: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #d946ef;
      --success: #10b981;
      --error: #ef4444;
      --border-color: #1e293b;
    }

    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.6);
      animation: pulse 2s infinite alternate;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #a5b4fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
      margin-top: 2px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .label-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .btn-text {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .btn-text:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    textarea {
      width: 100%;
      height: 140px;
      background-color: #0b0f19;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      color: var(--text-color);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--primary);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      opacity: 0.95;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .status-container {
      font-size: 12px;
      padding: 10px;
      border-radius: 8px;
      background-color: #0f172a;
      border: 1px solid var(--border-color);
      display: none;
      align-items: center;
      gap: 10px;
    }

    .status-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-loading {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    .status-success {
      background-color: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .status-error {
      background-color: var(--error);
      box-shadow: 0 0 6px var(--error);
    }

    .status-text {
      font-weight: 500;
      flex-grow: 1;
      word-break: break-all;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      from { transform: scale(0.9); opacity: 0.8; }
      to { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-dot"></div>
      <div>
        <h1>Resume Tailor AI</h1>
        <div class="subtitle">Match Job Descriptions & Compile PDF</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label-group">
      <label for="jd-input">Job Description (JD)</label>
      <button id="extract-btn" class="btn-text">Extract From Page</button>
    </div>
    <textarea id="jd-input" placeholder="Paste the job description here or click 'Extract From Page' to automatically fetch it..."></textarea>
  </div>

  <button id="tailor-btn" class="btn-primary">Tailor & Compile PDF</button>

  <div id="status-card" class="status-container" style="margin-top: 12px;">
    <div id="status-indicator" class="status-icon"></div>
    <div id="status-msg" class="status-text">Ready</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
